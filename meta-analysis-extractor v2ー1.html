// Canvas環境に最適化されたExponential Backoff (1s, 2s, 4s, 8s, 16s)
const fetchWithRetry=async(url,options,retries=5)=>{
  const delays=[1000,2000,4000,8000,16000];
  for(let i=0;i<retries;i++){
    try{
      const r=await fetch(url,options);
      if(!r.ok){
        let d={};try{d=await r.json();}catch(e){}
        throw new Error(`API Error ${r.status}: ${d.error?.message||r.statusText}`);
      }
      return await r.json();
    }
    catch(e){
      if(i===retries-1)throw e;
      await new Promise(r=>setTimeout(r,delays[i]));
    }
  }
};
const clipCopy=(text)=>{
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(text);return true;
  }
  const ta=document.createElement("textarea");ta.value=text;ta.style.cssText="position:fixed;top:0;left:0;opacity:0";
  document.body.appendChild(ta);ta.focus();ta.select();
  let ok=false;try{ok=document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);return ok;
};
const toDelimited=(headers,rows,delimiter)=>headers.join(delimiter)+"\n"+rows.map(r=>r.map(v=>String(v).replace(/[\t\n\r]/g,' ')).join(delimiter)).join("\n");

function PdfPage({pdf,pageNum,scale}){
  const canvasRef=useRef(null);const textRef=useRef(null);const[w,setW]=useState('auto');
  useEffect(()=>{
    let task;
    const render=async()=>{
      try{
        const page=await pdf.getPage(pageNum);
        const vp=page.getViewport({scale});
        const canvas=canvasRef.current;if(!canvas)return;
        const ctx=canvas.getContext('2d');canvas.height=vp.height;canvas.width=vp.width;setW(`${vp.width}px`);
        task=page.render({canvasContext:ctx,viewport:vp});
        await task.promise;
        const tc=await page.getTextContent();
        const tl=textRef.current;if(!tl)return;
        tl.innerHTML='';tl.style.width=`${vp.width}px`;tl.style.height=`${vp.height}px`;tl.style.setProperty('--scale-factor',scale);
        pdfjsLib.renderTextLayer({textContentSource:tc,container:tl,viewport:vp,textDivs:[]});
      }catch(e){if(e.name!=='RenderingCancelledException')console.warn(e);}
    };render();return()=>{if(task)try{task.cancel();}catch(e){}};
  },[pdf,pageNum,scale]);
  return(<div id={`pdf-page-${pageNum}`} className="bg-white shadow-lg relative rounded overflow-hidden flex-shrink-0 mx-auto mb-4" style={{width:w}}><canvas ref={canvasRef} className="block"/><div ref={textRef} className="textLayer"/><div className="absolute top-1.5 left-1.5 bg-black/60 text-white text-[9px] font-mono px-1.5 py-0.5 rounded-full z-20">P.{pageNum}</div></div>);
}

function PdfViewer({file,searchQuery,targetPage,onToast,scale}){
  const[pdf,setPdf]=useState(null);const[numPages,setNumPages]=useState(0);
  useEffect(()=>{if(!file)return;let d=false;file.arrayBuffer().then(buf=>{if(d)return;pdfjsLib.getDocument({data:buf}).promise.then(doc=>{if(d)return;setPdf(doc);setNumPages(doc.numPages);}).catch(()=>onToast("PDF読込失敗","error"));});return()=>{d=true;};},[file]);
  useEffect(()=>{if(!targetPage)return;const el=document.getElementById(`pdf-page-${targetPage}`);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},[targetPage]);

  // Highlight logic
  useEffect(()=>{
    if(!searchQuery)return;
    const timer=setTimeout(()=>{
      document.querySelectorAll('.highlight-hook').forEach(el=>el.classList.remove('highlight-hook'));
      const clean=searchQuery.replace(/[\n\r\t]/g,' ').replace(/\s+/g,' ').trim();
      if(!clean)return;
      // 修正: 日本語や記号を消さずに、空白のみを削除して比較するように変更
      const normQ=clean.toLowerCase().replace(/\s+/g,'');
      if(!normQ)return;
      let first=null;
      let matchCount=0;
      document.querySelectorAll('.textLayer span').forEach(span=>{
        const t=span.textContent;if(!t.trim())return;
        // 修正: こちらも空白のみ削除
        const normS=t.toLowerCase().replace(/\s+/g,'');
        if(!normS)return;
        
        // spanが検索クエリを含む、または検索クエリがspan(3文字以上)を含む場合にハイライト
        if(normS.includes(normQ) || (normS.length>=3 && normQ.includes(normS))){
          span.classList.add('highlight-hook');
          matchCount++;
          if(!first)first=span;
        }
      });
      if(first){
        first.scrollIntoView({behavior:'smooth',block:'center'});
        onToast(`該当箇所（${matchCount}部分）をハイライトしました`);
      }
      else onToast("PDF上にテキストが見つかりません。別のキーワードをお試しください","error");
    },700);
    return()=>clearTimeout(timer);
  },[searchQuery,scale]);

  if(!pdf)return<div className="flex h-full items-center justify-center text-slate-400"><span className="animate-spin h-5 w-5 border-2 border-slate-300 border-t-blue-500 rounded-full mr-2"/>PDF読込中...</div>;
  return(<div className="absolute top-0 left-0 min-w-full p-3 flex flex-col items-center pb-20">{Array.from({length:numPages},(_,i)=><PdfPage key={i+1} pdf={pdf} pageNum={i+1} scale={scale}/>)}</div>);
}

async function extractPdfText(file){const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;let t='';for(let i=1;i<=pdf.numPages;i++){const p=await pdf.getPage(i);const c=await p.getTextContent();t+=`\n--- Page ${i} ---\n`+c.items.map(x=>x.str).join(' ');}return t;}
async function extractPdfImages(file,onProgress){const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;const parts=[];for(let i=1;i<=pdf.numPages;i++){if(onProgress)onProgress(`高解像度レンダリング (${i}/${pdf.numPages})`);const p=await pdf.getPage(i);const vp=p.getViewport({scale:3.0});const c=document.createElement('canvas');const ctx=c.getContext('2d');c.height=vp.height;c.width=vp.width;await p.render({canvasContext:ctx,viewport:vp}).promise;parts.push({inlineData:{data:c.toDataURL('image/jpeg',0.95).split(',')[1],mimeType:"image/jpeg"}});c.width=0;c.height=0;}return parts;}
async function getPdfBase64(file){const buf=await file.arrayBuffer();const bytes=new Uint8Array(buf);let binary='';const chunk=8192;for(let i=0;i<bytes.length;i+=chunk)binary+=String.fromCharCode.apply(null,bytes.slice(i,i+chunk));return btoa(binary);}

    try{
      setStatus("reading_pdf");setStatusMsg("PDFのテキストと画像を準備中...");
      const[imgs,txt,pdfB64]=await Promise.all([extractPdfImages(pdfFile,m=>setStatusMsg(m)),extractPdfText(pdfFile),getPdfBase64(pdfFile)]);
      setStatus("analyzing");setStatusMsg("AIで抽出処理を実行中...");
      
      const valid=outcomes.filter(o=>o.name.trim());
      const picoBlock=`【PICO】P:${pico.p} I:${pico.i} C:${pico.c}\n【アウトカム】\n${valid.length?valid.map(o=>`- ${o.name}: ${o.definition||'定義なし'}`).join('\n'):'全自動抽出'}`;
      
      const genConfig={responseMimeType:"application/json",responseSchema:RESPONSE_SCHEMA,temperature:0.1};
      
      // Determine the API URL based on built-in flag vs provided key
      // The Canvas execution environment will resolve ${apiKey} automatically when set to ""
      const actualKey = useBuiltIn ? "" : apiKey;
      const actualModel = useBuiltIn ? "gemini-2.5-flash-preview-09-2025" : model;
      const apiUrl=`https://generativelanguage.googleapis.com/v1beta/models/${actualModel}:generateContent?key=${actualKey}`;

      const promptA=`${picoBlock}\n\n全アウトカムを網羅抽出。3群も自動検出。不明は「不明」。\n\n【テキスト】\n${txt}`;
      const promptB=`${picoBlock}\n\n全アウトカムを網羅抽出。3群も自動検出。不明は「不明」。\n\n【テキスト】\n${txt.substring(0,5000)}`;
      
      const[resA,resB]=await Promise.allSettled([
        fetchWithRetry(apiUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{role:"user",parts:[{text:promptA},...imgs]}],systemInstruction:{parts:[{text:SYSTEM_PROMPT}]},generationConfig:genConfig})}),
        fetchWithRetry(apiUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{role:"user",parts:[{text:promptB},{inlineData:{data:pdfB64,mimeType:"application/pdf"}}]}],systemInstruction:{parts:[{text:SYSTEM_PROMPT}]},generationConfig:genConfig})})
      ]);
      
      setStatusMsg("結果統合中...");
      const parse=(res)=>{if(res.status!=='fulfilled')return null;try{const t=res.value.candidates?.[0]?.content?.parts?.[0]?.text;return t?JSON.parse(t):null;}catch(e){return null;}};
      let rA=parse(resA),rB=parse(resB);
      
      if(!rA&&!rB){
        setStatusMsg("フォールバック中...");
        const fb=await fetchWithRetry(apiUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{role:"user",parts:[{text:promptA},...imgs]}],systemInstruction:{parts:[{text:SYSTEM_PROMPT}]},generationConfig:genConfig})});
        const rt=fb.candidates?.[0]?.content?.parts?.[0]?.text;
        if(!rt)throw new Error("AI応答なし");
        rA=JSON.parse(rt);
      }
      
      let primary,secondary;
      if(!rA){primary=rB;secondary=null;}else if(!rB){primary=rA;secondary=null;}
      else{const lA=(rA.extractedOutcomes?.length||0)+(rA.baselineCharacteristics?.length||0);const lB=(rB.extractedOutcomes?.length||0)+(rB.baselineCharacteristics?.length||0);primary=lA>=lB?rA:rB;secondary=lA>=lB?rB:rA;}
      
      if(secondary){
        if(secondary.extractedOutcomes&&primary.extractedOutcomes){const pk=new Set(primary.extractedOutcomes.map(o=>`${o.actualOutcomeName}|${o.timePoint}|${o.variableType}`));secondary.extractedOutcomes.filter(o=>!pk.has(`${o.actualOutcomeName}|${o.timePoint}|${o.variableType}`)).forEach(o=>{o.notes=(o.notes||'')+' [補完]';primary.extractedOutcomes.push(o);});}
        if(secondary.baselineCharacteristics){if(!primary.baselineCharacteristics)primary.baselineCharacteristics=secondary.baselineCharacteristics;else{const bk=new Set(primary.baselineCharacteristics.map(b=>b.variable));secondary.baselineCharacteristics.forEach(b=>{if(!bk.has(b.variable))primary.baselineCharacteristics.push(b);});}}
        ['unclearItems','statisticalMethods'].forEach(k=>{if(secondary[k]){const s=new Set(primary[k]||[]);secondary[k].forEach(v=>{if(!s.has(v))(primary[k]||(primary[k]=[])).push(v);});}});
        if(secondary.expertCommentary&&!primary.expertCommentary)primary.expertCommentary=secondary.expertCommentary;
      }
      
      setResult(primary);setStatus("complete");setStatusMsg("");showToast(`解析完了（${[rA?'画像':null,rB?'PDF':null].filter(Boolean).join('+')}）`);
    }catch(err){console.error(err);setStatus("error");setErrMsg(err.message);showToast("エラーが発生しました","error");}
  };

  const copyOneTSV=(o)=>{clipCopy(toDelimited(OC_HDRS,[outcomeRow(o)],"\t"))&&showToast("TSVコピー完了");};
  const copyOneCSV=(o)=>{clipCopy(toDelimited(OC_HDRS,[outcomeRow(o)],","))&&showToast("CSVコピー完了");};
  const copyAllTSV=()=>{if(!result)return;let t="";if(result.baselineCharacteristics?.length)t+="[患者背景]\n"+toDelimited(BL_HDRS,result.baselineCharacteristics.map(baselineRow),"\t")+"\n\n";if(result.extractedOutcomes?.length)t+="[アウトカム]\n"+toDelimited(OC_HDRS,result.extractedOutcomes.map(outcomeRow),"\t");clipCopy(t)&&showToast("全TSVコピー完了");};
  const copyAllCSV=()=>{if(!result)return;let t="";if(result.baselineCharacteristics?.length)t+=toDelimited(BL_HDRS,result.baselineCharacteristics.map(baselineRow),",")+"\n\n";if(result.extractedOutcomes?.length)t+=toDelimited(OC_HDRS,result.extractedOutcomes.map(outcomeRow),",");clipCopy(t)&&showToast("全CSVコピー完了");};
  const copyBaselineTSV=()=>{result?.baselineCharacteristics&&clipCopy(toDelimited(BL_HDRS,result.baselineCharacteristics.map(baselineRow),"\t"))&&showToast("患者背景TSVコピー完了");};
  const saveSession=()=>{const s={pico,outcomes,result,model:useBuiltIn?"Built-In":model,timestamp:new Date().toISOString()};const b=new Blob([JSON.stringify(s,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`meta-extract-${Date.now()}.json`;a.click();showToast("保存完了");};

  return(
    <div className="flex flex-col h-full bg-slate-50 text-slate-800">
      <Toast toast={toast}/>
      <header className="bg-white/90 backdrop-blur-sm border-b border-slate-200 py-2 px-3 z-20 flex-shrink-0">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2"><button onClick={onBack} className="text-slate-400 hover:text-blue-600 p-0.5 transition-colors"><ChevronLeft size={20}/></button><Activity size={20} className="text-blue-700"/><h1 className="text-sm sm:text-base font-bold text-slate-800">Meta-Analysis Data Extractor <span className="text-[10px] text-purple-600 font-mono">Pro v3</span></h1></div>
          <div className="flex items-center gap-2">
            <span className="text-[10px] text-slate-500 bg-slate-100 border border-slate-200 px-2 py-1 rounded font-mono hidden sm:flex items-center gap-1">
              {useBuiltIn ? <><ZapIcon size={10} className="text-amber-500"/> 内蔵API (gemini-2.5-flash-preview)</> : model}
            </span>
            {result&&<button onClick={saveSession} className="text-[10px] bg-white border border-slate-300 hover:bg-slate-50 px-2 py-1 rounded flex items-center gap-1 font-medium text-slate-600 transition-colors"><SaveIcon size={12}/>保存</button>}
          </div>
        </div>
      </header>

      <main className={`flex-1 flex flex-col min-h-0 w-full overflow-hidden ${status==='complete'?'p-1.5 sm:p-3':''}`}>
        {status!=='complete'&&(
          <div className="flex-1 overflow-y-auto p-3 sm:p-5 max-w-4xl mx-auto w-full space-y-4 pb-10">
            <section className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden fade-in-up">
              <div className="bg-slate-100 px-4 py-2 border-b border-slate-200 flex items-center gap-2"><SettingsIcon size={15} className="text-slate-500"/><h2 className="font-semibold text-slate-700 text-xs">PICO設定</h2></div>
              <div className="p-3 space-y-2">{[["P (患者)","p","例: 心不全患者"],["I (介入)","i","例: SGLT2阻害薬"],["C (比較)","c","例: プラセボ"]].map(([l,k,ph])=>(<div key={k}><label className="block text-[10px] font-medium text-slate-500 mb-0.5">{l}</label><input type="text" value={pico[k]} onChange={e=>setPico({...pico,[k]:e.target.value})} className="w-full text-xs p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder={ph}/></div>))}</div>
            </section>
            <section className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden fade-in-up fade-d1">
              <div className="bg-slate-100 px-4 py-2 border-b border-slate-200 flex items-center justify-between"><div className="flex items-center gap-2"><Database size={15} className="text-slate-500"/><h2 className="font-semibold text-slate-700 text-xs">アウトカム定義</h2></div><button onClick={addOutcome} className="text-[10px] flex items-center gap-1 text-blue-600 hover:text-blue-800 font-medium transition-colors"><PlusIcon size={13}/>追加</button></div>
              <div className="p-3 space-y-2 max-h-[35vh] overflow-y-auto">
                <div className="bg-blue-50 border border-blue-200 rounded p-2 text-[10px] text-blue-800">全アウトカムが自動抽出されます。ここは優先探索用です。</div>
                {outcomes.map((o,idx)=>(<div key={o.id} className="p-2 border border-slate-200 rounded bg-slate-50"><div className="flex justify-between items-start mb-1"><span className="text-[10px] font-bold text-slate-500">#{idx+1}</span>{outcomes.length>1&&<button onClick={()=>removeOutcome(o.id)} className="text-slate-400 hover:text-red-500 transition-colors"><Trash2 size={13}/></button>}</div><input type="text" value={o.name} onChange={e=>changeOutcome(o.id,'name',e.target.value)} className="w-full text-xs p-1.5 border border-slate-300 rounded mb-1 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="アウトカム名"/><textarea value={o.definition} onChange={e=>changeOutcome(o.id,'definition',e.target.value)} className="w-full text-[10px] p-1.5 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none resize-none h-12" placeholder="定義・条件"/></div>))}
              </div>
            </section>
            <section className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden fade-in-up fade-d2">
              <div className="p-4">
                <div className={`border-2 border-dashed rounded-xl p-5 text-center cursor-pointer transition-colors ${pdfFile?'border-blue-400 bg-blue-50':'border-slate-300 hover:border-slate-400 hover:bg-slate-50'}`} onDragOver={e=>e.preventDefault()} onDrop={handleDrop} onClick={()=>fileRef.current?.click()}>
                  <input type="file" ref={fileRef} onChange={handleFileSelect} accept="application/pdf" className="hidden"/>
                  {pdfFile?<div className="flex flex-col items-center text-blue-700"><FileText size={28} className="mb-1"/><span className="font-medium text-xs truncate w-full">{pdfFile.name}</span><span className="text-[10px] text-blue-500">{(pdfFile.size/1024/1024).toFixed(2)} MB</span></div>:<div className="flex flex-col items-center text-slate-500"><UploadCloud size={28} className="mb-1 text-slate-400"/><span className="font-medium text-xs">PDFをドロップまたはクリック</span></div>}
                </div>
                <button onClick={startAnalysis} disabled={status==='reading_pdf'||status==='analyzing'} className="w-full mt-3 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white font-medium py-3 rounded-lg flex items-center justify-center gap-2 text-sm transition-all shadow-md">{(status==='reading_pdf'||status==='analyzing')?<><span className="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"/>解析中...</>:<><FileSearch size={16}/>データ抽出を実行</>}</button>
              </div>
            </section>
            {status==='idle'&&!result&&(<div className="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col items-center justify-center p-8 text-slate-400 fade-in-up fade-d3"><Activity size={40} className="mb-3 opacity-20"/><p className="text-sm font-medium text-slate-500">結果はここに表示されます</p></div>)}
            {(status==='reading_pdf'||status==='analyzing')&&(<div className="bg-white rounded-xl shadow-sm border border-blue-200 flex flex-col items-center justify-center p-8 fade-in-up"><div className="animate-spin h-14 w-14 border-4 border-blue-600 border-t-transparent rounded-full mb-4"/><h3 className="text-sm font-bold text-slate-700 mb-1">{status==='reading_pdf'?'PDF読込中':'AI解析中'}</h3><p className="text-[10px] text-slate-500 animate-pulse">{statusMsg}</p></div>)}
            {status==='error'&&errMsg&&<div className="bg-red-50 border border-red-200 text-red-700 rounded-xl p-4 text-xs"><AlertCircle size={16} className="inline mr-1"/>{errMsg}</div>}
          </div>
        )}

        {status==='complete'&&result&&(
          <div className="flex flex-1 min-h-0 gap-2 split-h">
            <div className="w-full xl:w-[55%] h-full flex flex-col bg-white rounded-lg shadow border border-slate-200 overflow-hidden split-pane">
              <div className="flex items-center justify-between bg-slate-50 px-3 py-1.5 border-b border-slate-200 flex-shrink-0">
                <h2 className="font-bold text-xs text-slate-800 flex items-center gap-1.5"><Database size={14} className="text-purple-600"/>抽出データ</h2>
                <div className="flex items-center gap-2">
                  <div className="flex items-center gap-1 bg-white border border-slate-200 rounded px-1.5 py-0.5">
                    <TypeIcon size={11} className="text-slate-400"/>
                    <button onClick={()=>setLeftFontSize(s=>Math.max(7,s-1))} className="text-slate-500 hover:text-blue-600 px-0.5 font-bold text-[10px] transition-colors">−</button>
                    <span className="text-[9px] font-mono w-5 text-center text-slate-600">{leftFontSize}</span>
                    <button onClick={()=>setLeftFontSize(s=>Math.min(16,s+1))} className="text-slate-500 hover:text-blue-600 px-0.5 font-bold text-[10px] transition-colors">+</button>
                  </div>
                  <button onClick={copyAllTSV} className="text-[9px] bg-white border border-slate-300 hover:bg-slate-50 px-2 py-1 rounded flex items-center gap-1 font-bold transition-colors"><CopyIcon size={10}/>TSV</button>
                  <button onClick={copyAllCSV} className="text-[9px] bg-white border border-slate-300 hover:bg-slate-50 px-2 py-1 rounded flex items-center gap-1 font-bold transition-colors"><CopyIcon size={10}/>CSV</button>
                </div>
              </div>

              <div className="flex-1 overflow-y-auto p-2 sm:p-3 space-y-4" style={{fontSize:`${leftFontSize}px`}}>
                <section className="border border-slate-200 rounded-lg overflow-hidden">
                  <div className="bg-slate-100 px-2 py-1 border-b"><h3 className="font-semibold text-slate-700" style={{fontSize:`${leftFontSize}px`}}>PICO比較</h3></div>
                  <table className="w-full"><thead className="bg-slate-50 text-slate-500 border-b"><tr><th className="px-2 py-1 text-left w-10">要素</th><th className="px-2 py-1 text-left border-l border-slate-200">設定</th><th className="px-2 py-1 text-left border-l border-slate-200 bg-blue-50/50">論文</th></tr></thead>
                  <tbody className="divide-y divide-slate-100">
                    {[["P","p","P"],["I","i","I"],["C","c","C"]].map(([l,k,pk])=><tr key={k}><td className="px-2 py-1 font-medium">{l}</td><td className="px-2 py-1 border-l border-slate-200">{pico[k]||"-"}</td><td className="px-2 py-1 border-l border-slate-200 bg-blue-50/20">{result.paperPICO?.[pk]||"不明"}</td></tr>)}
                    {result.paperPICO?.thirdGroup&&<tr><td className="px-2 py-1 font-medium text-purple-700">3群</td><td className="px-2 py-1 border-l border-slate-200">-</td><td className="px-2 py-1 border-l border-slate-200 bg-purple-50/30 font-medium text-purple-800">{result.paperPICO.thirdGroup}</td></tr>}
                  </tbody></table>
                </section>

                {result.baselineCharacteristics?.length>0&&(
                  <section className="border border-emerald-200 rounded-lg overflow-hidden">
                    <div className="bg-emerald-50 px-2 py-1 border-b border-emerald-200 flex items-center justify-between"><h3 className="font-semibold text-emerald-800">👥 患者背景</h3><button onClick={copyBaselineTSV} className="bg-white border border-emerald-300 px-1.5 py-0.5 rounded font-medium text-emerald-700 hover:bg-emerald-100 transition-colors" style={{fontSize:`${Math.max(8,leftFontSize*0.8)}px`}}><CopyIcon size={9} className="inline mr-0.5"/>TSV</button></div>
                    <div className="overflow-x-auto"><table className="w-full whitespace-nowrap"><thead className="bg-slate-50 text-slate-500 border-b"><tr><th className="px-1.5 py-1 text-left border-r sticky left-0 bg-slate-50 z-10 min-w-[80px]">変数</th><th className="px-1 py-1 text-center border-r" colSpan="3">介入群</th><th className="px-1 py-1 text-center border-r" colSpan="3">対照群</th><th className="px-1 py-1 text-center">P値</th></tr><tr className="bg-slate-100 border-b" style={{fontSize:`${Math.max(7,leftFontSize*0.75)}px`}}><th className="px-1.5 py-0.5 border-r sticky left-0 bg-slate-100 z-10"/>{["N","値","SD/%","N","値","SD/%"].map((h,i)=><th key={i} className="px-1 py-0.5 text-center border-r font-medium">{h}</th>)}<th className="px-1 py-0.5 text-center"/></tr></thead>
                    <tbody className="divide-y divide-slate-100">{result.baselineCharacteristics.map((b,idx)=>(<tr key={idx} className="hover:bg-blue-50/30"><td className="px-1.5 py-1 border-r font-medium text-slate-800 sticky left-0 bg-white z-10">{b.variable}{b.unit&&<span className="text-slate-400 ml-0.5">({b.unit})</span>}{b.pageNumber&&<span className="text-slate-400 ml-0.5 font-mono" style={{fontSize:`${Math.max(6,leftFontSize*0.65)}px`}}>P{b.pageNumber}</span>}</td><td className="px-1 py-1 border-r text-center">{b.interventionGroup?.n||"-"}</td><td className="px-1 py-1 border-r text-center font-medium text-blue-700">{b.interventionGroup?.value||"-"}</td><td className="px-1 py-1 border-r text-center text-slate-500">{b.interventionGroup?.sd||b.interventionGroup?.percent||b.interventionGroup?.iqr||"-"}</td><td className="px-1 py-1 border-r text-center">{b.comparisonGroup?.n||"-"}</td><td className="px-1 py-1 border-r text-center font-medium text-blue-700">{b.comparisonGroup?.value||"-"}</td><td className="px-1 py-1 border-r text-center text-slate-500">{b.comparisonGroup?.sd||b.comparisonGroup?.percent||b.comparisonGroup?.iqr||"-"}</td><td className="px-1 py-1 text-center">{b.pValue&&b.pValue!=="-"?<span className={`font-mono ${parseFloat(b.pValue)<0.05?'text-red-600 font-bold':'text-slate-600'}`}>{b.pValue}</span>:"-"}</td></tr>))}</tbody></table></div>
                    <div className="px-2 py-1 bg-slate-50 border-t border-slate-200 text-slate-500 flex justify-between" style={{fontSize:`${Math.max(8,leftFontSize*0.8)}px`}}><span>{result.baselineCharacteristics.length}項目</span><span>出処: {result.baselineCharacteristics[0]?.sourceLocation||"Table 1等"}</span></div>
                  </section>
                )}

                <div className="space-y-3">
                  {result.extractedOutcomes?.map((oc,idx)=>(
                    <OutcomeCard key={idx} oc={oc} idx={idx} pico={pico} onEdit={editOutcome}
                      onCopyTSV={copyOneTSV} onCopyCSV={copyOneCSV} fontSize={leftFontSize}
                      onHighlight={(o)=>{setHlQuery(o.evidenceText);setHlPage(o.pageNumber);setPdfSearchText(o.evidenceText||"");}}
                      onSendToSearch={sendToSearch}/>
                  ))}
                  {(!result.extractedOutcomes?.length)&&<div className="text-center py-6 text-slate-500">データなし</div>}
                </div>

                {result.expertCommentary&&(<section className="bg-gradient-to-br from-indigo-50 to-blue-50 rounded-lg border border-indigo-100 overflow-hidden"><div className="px-2 py-1.5 border-b border-indigo-100 flex items-center gap-1"><Sparkles size={12} className="text-indigo-600"/><h3 className="font-bold text-indigo-800">AI考察</h3></div><div className="p-2 text-indigo-900 leading-relaxed whitespace-pre-wrap">{result.expertCommentary}</div></section>)}
                <div className="grid grid-cols-2 gap-2">
                  <section className="bg-white rounded-lg border border-slate-200 overflow-hidden"><div className="bg-slate-100 px-2 py-1 border-b"><h3 className="font-semibold text-slate-700">統計手法</h3></div><ul className="p-2 list-disc pl-4 text-slate-600 space-y-0.5">{result.statisticalMethods?.length?result.statisticalMethods.map((m,i)=><li key={i}>{m}</li>):<li className="text-slate-400 list-none">不明</li>}</ul></section>
                  <section className="bg-white rounded-lg border border-slate-200 overflow-hidden"><div className="bg-slate-100 px-2 py-1 border-b"><h3 className="font-semibold text-slate-700 flex items-center gap-1"><AlertCircle size={10} className="text-amber-500"/>不明点</h3></div><ul className="p-2 list-disc pl-4 text-slate-600 space-y-0.5">{result.unclearItems?.length?result.unclearItems.map((x,i)=><li key={i}>{x}</li>):<li className="text-slate-400 list-none">なし</li>}</ul></section>
                </div>
              </div>
            </div>

            <div className="w-full xl:w-[45%] h-full flex flex-col bg-slate-200 rounded-lg border border-slate-300 shadow-inner overflow-hidden relative split-pane">
              <div className="bg-slate-800 text-slate-200 text-[9px] px-2 py-1.5 flex items-center justify-between z-10 flex-shrink-0">
                <span className="flex items-center gap-1 font-mono truncate max-w-[35%]"><FileText size={11}/>{pdfFile?.name}</span>
                <div className="flex items-center gap-1.5">
                  {hlQuery?<span className="bg-yellow-400 text-yellow-900 px-1 py-0.5 rounded font-bold text-[8px] animate-pulse">HL</span>:null}
                  <div className="flex items-center gap-0.5 bg-slate-700 p-0.5 rounded">
                    <button onClick={()=>setPdfScale(s=>Math.max(0.4,s-0.2))} className="p-0.5 hover:bg-slate-500 rounded text-slate-300 transition-colors"><ZoomOutIcon size={11}/></button>
                    <span className="font-mono w-7 text-center text-[9px]">{Math.round(pdfScale*100)}%</span>
                    <button onClick={()=>setPdfScale(s=>Math.min(3,s+0.2))} className="p-0.5 hover:bg-slate-500 rounded text-slate-300 transition-colors"><ZoomInIcon size={11}/></button>
                  </div>
                </div>
              </div>

              <div className="bg-slate-700 px-2 py-1.5 flex items-center gap-1.5 z-10 flex-shrink-0 border-b border-slate-600">
                <SearchIcon size={13} className="text-slate-400 flex-shrink-0"/>
                <input
                  type="text"
                  value={pdfSearchText}
                  onChange={e=>setPdfSearchText(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter')executePdfSearch();}}
                  placeholder="テキストを貼り付けてEnterまたは検索ボタン..."
                  className="flex-1 bg-slate-600 text-white text-[10px] px-2 py-1 rounded border border-slate-500 focus:outline-none focus:border-blue-400 placeholder-slate-400 font-mono transition-colors"
                />
                <button onClick={executePdfSearch} className="bg-yellow-400 hover:bg-yellow-500 text-yellow-900 text-[9px] font-bold px-2 py-1 rounded flex items-center gap-0.5 flex-shrink-0 transition-colors">
                  <TargetIcon size={10}/>検索
                </button>
                <button onClick={()=>{document.querySelectorAll('.highlight-hook').forEach(el=>el.classList.remove('highlight-hook'));setPdfSearchText("");setHlQuery("");showToast("ハイライト解除");}} className="text-slate-400 hover:text-white text-[9px] px-1 py-1 rounded flex-shrink-0 transition-colors" title="クリア">
                  <XCircle size={12}/>
                </button>
              </div>

              <div className="flex-1 overflow-auto relative bg-slate-300">
                <PdfViewer file={pdfFile} searchQuery={hlQuery} targetPage={hlPage} onToast={showToast} scale={pdfScale}/>
              </div>
            </div>
          </div>
        )}
      </main>
    </div>
  );
}

/* ============================================================
   SECTION 12: ROOT
   ============================================================ */
function App(){
  const[page,setPage]=useState("setup");
  const[apiKey,setApiKey]=useState("");
  const[model,setModel]=useState("");
  const[useBuiltIn,setUseBuiltIn]=useState(true);
  
  const handleSetupComplete=(key,mdl,isBuiltIn)=>{
    setApiKey(key);
    setModel(mdl);
    setUseBuiltIn(isBuiltIn);
    setPage("main");
  };
  
  if(page==="setup")return<SetupPage onComplete={handleSetupComplete}/>;
  return<ExtractorPage apiKey={apiKey} model={model} useBuiltIn={useBuiltIn} onBack={()=>setPage("setup")}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
